<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Formulaire d'inscription</title>
<link rel="stylesheet" href="css/style.css">
<script defer src="js/script.js"></script>
</head>

<body>

<h1>Formulaire d'inscription</h1>

<form id="form">

<fieldset>
<legend>Informations personnelles</legend>

<label>Nom</label>
<input type="text" name="nom" required autocomplete="family-name" title="Veuillez entrer votre nom">

<label>Prénom</label>
<input type="text" name="prenom" required autocomplete="given-name" title="Veuillez entrer votre prénom">

<label>Email</label>
<input type="email" name="email" required autocomplete="email" title="Veuillez entrer un adresse email valide">

<label>Téléphone</label>
<input type="tel"
       name="telephone"
       pattern="^0[1-9]([-. ]?[0-9]{2}){4}$"
       placeholder="06 12 34 56 78"
       required
       title="Téléphone obligatoire au format français (ex: 06 12 34 56 78)">

<label>Date de naissance</label>
<input type="date" id="birthdate" name="birthdate" required title="Vous devez avoir au minimum 18 ans">

</fieldset>


<fieldset>
<legend>Sécurité</legend>

<label>Mot de passe</label>
<input type="password"
       id="password"
       pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
       title="8 caractères minimum, 1 majuscule et 1 chiffre"
       required>

<label>Confirmer le mot de passe</label>
<input type="password" id="confirm_password" name="confirm_password" required title="Les mots de passe doivent correspondre">

</fieldset>


<fieldset>
<legend>Informations supplémentaires</legend>

<label>Pays</label>
<input list="pays" name="pays" title="Sélectionnez votre pays">
<datalist id="pays">
<option value="France">
<option value="Maroc">
<option value="Canada">
<option value="Belgique">
</datalist>

<label>Genre</label>
<input type="radio" name="genre" value="Homme" required title="Veuillez sélectionner votre genre"> Homme
<input type="radio" name="genre" value="Femme" title="Veuillez sélectionner votre genre"> Femme

<br><br>

<label>Centres d'intérêt</label><br>

<input type="checkbox"> Sport
<input type="checkbox"> Musique
<input type="checkbox"> Lecture
<input type="checkbox"> Voyage

<br><br>

<label>Biographie</label><br>
<textarea name="biographie" maxlength="200"></textarea>

<br><br>

<label>Photo de profil</label>
<input type="file" name="photo" accept="image/*" title="Veuillez télécharger une image (JPG, PNG, etc.)">

<br><br>

<label>
<input type="checkbox" name="cgu" required title="Vous devez accepter les conditions générales d'utilisation">
J'accepte les CGU
</label>

</fieldset>

<br>

<button type="submit">S'inscrire</button>

</form>

</body>
</html>
